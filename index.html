<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Générateur de Pouvoir</title>
    <!-- Anti-FOUC (FR-002) : pose les 3 axes de thème depuis localStorage AVANT le 1er rendu,
         pour éviter le flash. Défauts sombre/violet/A si absent/illisible. Clés alignées sur ui.ts. -->
    <script>
      (function () {
        try {
          var d = document.documentElement,
            ls = window.localStorage,
            pick = function (k, allowed, def) {
              var v = ls ? ls.getItem(k) : null;
              return v && allowed.indexOf(v) !== -1 ? v : def;
            };
          d.setAttribute('data-mode', pick('ui.mode', ['dark', 'light'], 'dark'));
          d.setAttribute(
            'data-palette',
            pick('ui.palette', ['violet', 'cyan', 'vert', 'ambre', 'rose', 'bleu'], 'violet'),
          );
          d.setAttribute('data-style', pick('ui.style', ['a', 'b', 'c', 'd', 'e', 'f'], 'a'));
        } catch (e) {
          var el = document.documentElement;
          el.setAttribute('data-mode', 'dark');
          el.setAttribute('data-palette', 'violet');
          el.setAttribute('data-style', 'a');
        }
      })();
    </script>
    <meta name="description" content="Générateur de pouvoirs déterministe (PWA hors-ligne)." />
    <!-- Polices auto-hébergées (FR-020) : déclarées en @font-face dans src/app.css, précachées par
         le service worker (hors-ligne strict). Aucun appel tiers (Principe X). Repli système en sécurité. -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
